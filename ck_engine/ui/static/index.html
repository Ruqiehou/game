<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CK 引擎 · 可操作地图</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">CK Map</div>
      <div id="date" class="date">—</div>
      <div id="player-summary" class="player-summary">—</div>
      <div class="time-controls">
        <button data-days="1">+1天</button>
        <button data-days="7">+1周</button>
        <button data-days="30">+1月</button>
        <button data-days="90">+1季</button>
        <button data-days="365">+1年</button>
      </div>
    </header>

    <main class="layout">
      <section class="map-panel">
        <svg id="map" viewBox="0 0 820 720" role="img" aria-label="游戏地图"></svg>
        <div class="map-hint">点击省份查看 · 已选军团后再点省份可下令行军</div>
      </section>

      <aside class="side">
        <!-- 标签页导航 -->
        <nav class="tabs" id="tab-nav">
          <button class="tab active" data-tab="player">玩家</button>
          <button class="tab" data-tab="county">省份</button>
          <button class="tab" data-tab="diplomacy">外交</button>
          <button class="tab" data-tab="schemes">阴谋</button>
          <button class="tab" data-tab="council">内阁</button>
          <button class="tab" data-tab="war">战争</button>
          <button class="tab" data-tab="save">存档</button>
        </nav>

        <!-- 玩家面板 -->
        <div class="tab-content active" id="tab-player">
          <section class="card">
            <h2>玩家</h2>
            <select id="player-select"></select>
            <div id="player-detail" class="detail"></div>
            <div class="btn-row">
              <button id="btn-raise">征召军团</button>
              <button id="btn-feast">宴会 (20金)</button>
              <button id="btn-disband">解散军团</button>
            </div>
          </section>

          <section class="card">
            <h2>法律</h2>
            <div id="laws" class="detail"></div>
          </section>

          <section class="card">
            <h2>军团详情</h2>
            <div id="army-detail" class="detail">未选择军团</div>
            <div class="btn-row">
              <button id="btn-recruit-knights">招募精锐 (25金)</button>
            </div>
            <div class="btn-row">
              <select id="commander-select"></select>
              <button id="btn-set-commander">任命指挥官</button>
            </div>
          </section>
        </div>

        <!-- 省份面板 -->
        <div class="tab-content" id="tab-county">
          <section class="card">
            <h2>选中省份</h2>
            <div id="county-detail" class="detail">点击地图选择省份</div>
            <div class="btn-row">
              <button id="btn-move">行军至此</button>
              <button id="btn-war">对领主宣战</button>
              <button id="btn-improve">改善关系 (10金)</button>
              <button id="btn-develop">发展 (+1, 10金)</button>
              <button id="btn-fabricate">伪造宣称 (50金)</button>
            </div>
          </section>
          <section class="card">
            <h2>建筑</h2>
            <div id="county-buildings" class="detail">选择省份查看建筑</div>
          </section>
          <section class="card">
            <h2>宣称</h2>
            <div id="claims" class="list"></div>
          </section>
        </div>

        <!-- 外交面板 -->
        <div class="tab-content" id="tab-diplomacy">
          <section class="card">
            <h2>选择角色</h2>
            <select id="dipl-char-select"></select>
            <div id="dipl-char-detail" class="detail">选择一位角色</div>
          </section>
          <section class="card">
            <h2>外交操作</h2>
            <div class="btn-row">
              <button id="btn-alliance">缔结同盟</button>
              <button id="btn-non-aggression">互不侵犯</button>
              <button id="btn-marry">求婚</button>
            </div>
            <div class="btn-row">
              <input id="gift-amount" type="number" value="50" min="1" max="500" style="width:70px" />
              <button id="btn-gift">送礼</button>
              <button id="btn-rival">设为宿敌</button>
            </div>
          </section>
          <section class="card">
            <h2>条约与关系</h2>
            <div id="treaties" class="list"></div>
          </section>
        </div>

        <!-- 阴谋面板 -->
        <div class="tab-content" id="tab-schemes">
          <section class="card">
            <h2>发起阴谋</h2>
            <select id="scheme-target-select"></select>
            <select id="scheme-type-select"></select>
            <div class="btn-row">
              <button id="btn-start-scheme">开始策划</button>
            </div>
          </section>
          <section class="card">
            <h2>进行中阴谋</h2>
            <div id="scheme-list" class="list"></div>
          </section>
        </div>

        <!-- 内阁面板 -->
        <div class="tab-content" id="tab-council">
          <section class="card">
            <h2>内阁成员</h2>
            <div id="council-list" class="detail"></div>
          </section>
        </div>

        <!-- 战争面板 -->
        <div class="tab-content" id="tab-war">
          <section class="card">
            <h2>战争</h2>
            <div id="wars" class="list"></div>
          </section>
          <section class="card">
            <h2>针对你的派系</h2>
            <div id="factions" class="list"></div>
          </section>
        </div>

        <!-- 存档面板 -->
        <div class="tab-content" id="tab-save">
          <section class="card">
            <h2>存档管理器</h2>
            <div class="save-row">
              <input id="save-name" placeholder="存档名" maxlength="48" />
              <button id="btn-save">保存</button>
            </div>
            <div id="saves" class="list saves"></div>
            <div class="btn-row">
              <button id="btn-load">读取选中</button>
              <button id="btn-delete-save">删除选中</button>
              <button id="btn-new">新局</button>
            </div>
          </section>
        </div>

        <!-- 日志（始终显示） -->
        <section class="card log-card">
          <h2>指令 / 日志</h2>
          <div id="messages" class="list msg"></div>
          <div id="log" class="list log"></div>
        </section>
      </aside>
    </main>
  </div>
  <div id="event-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);align-items:center;justify-content:center;z-index:1000;">
    <div style="background:#12161f;border:1px solid var(--border);border-radius:10px;max-width:520px;width:92%;padding:18px;color:var(--text);">
      <h3 id="event-title" style="margin:0 0 8px;font-size:16px;"></h3>
      <p id="event-desc" style="margin:0 0 14px;font-size:13px;color:#cfd6e4;"></p>
      <div id="event-choices" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
